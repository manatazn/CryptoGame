<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Giveaway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <style>
        :root {
            --bg-main: #06090F;
            --bg-gradient: radial-gradient(circle at top, #111A2C 0%, #06090F 80%);
            --card-bg: rgba(17, 24, 39, 0.75);
            --card-border: rgba(59, 130, 246, 0.2);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --primary-gradient: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            --accent-gold: #FBBF24;
            --gold-glow: rgba(251, 191, 36, 0.4);
            --text-light: #F8FAFC;
            --text-gray: #94A3B8;
            --success: #10B981;
            --success-bg: rgba(16, 185, 129, 0.15);
            --error: #EF4444;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; 
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }

        body {
            background: var(--bg-gradient);
            background-color: var(--bg-main);
            color: var(--text-light);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 80px; /* Space for bottom nav */
        }

        img, svg { user-drag: none; pointer-events: none; }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0F172A 0%, #06090F 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease;
        }

        .logo-anim-container { position: relative; width: 90px; height: 110px; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; }
        .anim-coin {
            width: 38px; height: 38px; background: linear-gradient(135deg, #FCD34D 0%, #F59E0B 100%);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            color: #78350F; font-weight: bold; font-family: 'Poppins', sans-serif; font-size: 1.2rem;
            position: absolute; top: 0; box-shadow: 0 0 25px var(--gold-glow);
            animation: dropCoin 2.5s cubic-bezier(0.28, 0.84, 0.42, 1) infinite;
        }
        .anim-box { font-size: 3.5rem; position: absolute; bottom: 0; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.6)); animation: boxBounce 2.5s ease-in-out infinite; }

        @keyframes dropCoin {
            0% { transform: translateY(-50px) rotateY(0deg) scale(0.8); opacity: 0; }
            30% { opacity: 1; transform: translateY(-10px) rotateY(180deg) scale(1.1); box-shadow: 0 0 35px #FBBF24; }
            60% { transform: translateY(30px) rotateY(360deg) scale(0.5); opacity: 0; }
            100% { transform: translateY(30px) scale(0); opacity: 0; }
        }
        @keyframes boxBounce { 0%, 50%, 100% { transform: translateY(0) scale(1); } 55% { transform: translateY(8px) scale(1.08, 0.92); } 65% { transform: translateY(-8px) scale(0.92, 1.08); } }

        .splash-title { 
            font-family: 'Poppins', sans-serif; font-size: 1.6rem; font-weight: 800; color: white; 
            letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase;
            text-shadow: 0 0 20px var(--primary-glow); animation: pulseText 2s infinite alternate;
        }
        @keyframes pulseText { from { opacity: 0.8; } to { opacity: 1; text-shadow: 0 0 30px var(--primary-glow); } }
        
        .loading-bar { width: 180px; height: 6px; background: rgba(255,255,255,0.05); border-radius: 6px; overflow: hidden; position: relative; }
        .loading-progress { 
            width: 50%; height: 100%; background: linear-gradient(90deg, transparent, var(--primary), #60A5FA, var(--primary), transparent); 
            border-radius: 6px; position: absolute; left: -50%; animation: loadSlide 1.2s infinite linear; box-shadow: 0 0 10px var(--primary);
        }
        @keyframes loadSlide { 100% { left: 100%; } }

        /* --- APP WRAPPERS --- */
        .view-container {
            width: 100%; max-width: 480px; padding: 20px;
            display: none; flex-direction: column; gap: 24px;
            animation: fadeInView 0.5s ease forwards;
        }
        .view-container.active { display: flex; }
        @keyframes fadeInView { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- PROFILE CARD --- */
        .profile-card {
            background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 18px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(59, 130, 246, 0.05);
        }
        .profile-avatar { width: 56px; height: 56px; border-radius: 50%; border: 2px solid var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
        .profile-info { flex: 1; }
        .profile-name { font-family: 'Poppins', sans-serif; font-size: 1.1rem; font-weight: 700; color: white; margin-bottom: 4px; }
        .profile-uid { font-size: 0.9rem; color: var(--accent-gold); font-weight: 600; letter-spacing: 0.5px; background: rgba(251, 191, 36, 0.1); padding: 2px 8px; border-radius: 6px; display: inline-block;}

        /* --- WALLET UI --- */
        .wallet-card {
            background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 24px; padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(59, 130, 246, 0.05);
            border: 1px solid var(--card-border); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        .balance-title { font-size: 1rem; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; font-weight: 600;}
        .balance-amount { font-family: 'Poppins', sans-serif; font-size: 3rem; font-weight: 800; color: white; text-shadow: 0 0 20px var(--primary-glow); }
        #ton-connect { margin-top: 10px; }

        /* --- GIVEAWAY LIST --- */
        .section-title { font-family: 'Poppins', sans-serif; font-size: 1.15rem; font-weight: 600; color: white; margin: 5px 0; display: flex; align-items: center; gap: 8px;}
        .section-title::before { content: ''; width: 4px; height: 18px; background: var(--primary); border-radius: 4px; box-shadow: 0 0 10px var(--primary); }
        
        .gw-list-card {
            background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px;
            padding: 16px; display: flex; align-items: center; gap: 15px; cursor: pointer;
            transition: var(--transition); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }
        .gw-list-card:hover { border-color: rgba(59, 130, 246, 0.5); transform: translateY(-3px); box-shadow: 0 8px 25px var(--primary-glow); }
        .gw-icon { font-size: 2.5rem; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .gw-details { flex: 1; }
        .gw-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 1.05rem; color: white; margin-bottom: 4px; }
        .gw-meta { font-size: 0.85rem; color: var(--text-gray); }
        .gw-status { color: var(--success); font-weight: 600; font-size: 0.75rem; background: var(--success-bg); padding: 3px 8px; border-radius: 6px; display: inline-block; margin-top: 6px;}

        /* --- GIVEAWAY DETAIL VIEW --- */
        .giveaway-card {
            background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 24px; padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(59, 130, 246, 0.05);
            border: 1px solid var(--card-border); text-align: center;
        }
        .prize-title { font-family: 'Poppins', sans-serif; color: white; font-size: 3.5rem; font-weight: 800; line-height: 1; margin-bottom: 5px; text-shadow: 0 0 30px var(--primary-glow); }
        .subtitle { color: var(--accent-gold); font-size: 1.05rem; margin-bottom: 25px; font-weight: 600; text-shadow: 0 0 10px var(--gold-glow); }

        /* Timer */
        .timer-wrapper { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .time-box { background: rgba(0, 0, 0, 0.5); padding: 12px 0; border-radius: 14px; width: 65px; border: 1px solid rgba(59, 130, 246, 0.2); box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .time-val { font-family: 'Poppins', sans-serif; font-size: 1.4rem; font-weight: 700; color: white; display: block; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .time-lbl { font-size: 0.65rem; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; display: block; font-weight: 600;}

        /* Steps */
        .steps-container { text-align: left; }
        .step-card { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .step-header { font-family: 'Poppins', sans-serif; font-weight: 600; margin-bottom: 6px; font-size: 1.05rem; color: white; display: flex; justify-content: space-between; align-items: center;}
        .step-desc { font-size: 0.85rem; color: var(--text-gray); margin-bottom: 15px; }
        .ad-counter { color: var(--accent-gold); font-weight: bold; background: rgba(251,191,36,0.1); padding: 4px 10px; border-radius: 8px; font-size: 0.9rem;}

        .btn { width: 100%; padding: 15px; border-radius: 14px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: var(--transition); text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-join { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn-join:hover { background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .btn-ad { background: linear-gradient(90deg, #8B5CF6, #6D28D9); color: white; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
        .btn-ad:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6); }
        .btn-verify { background: var(--primary-gradient); color: white; box-shadow: 0 4px 15px var(--primary-glow); margin-top: 15px; font-size: 1.05rem; padding: 16px;}
        .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 6px 25px var(--primary-glow); }
        .btn:disabled, .btn.joined { background: var(--success-bg); color: var(--success); border: 1px solid rgba(16,185,129,0.3); cursor: default; transform: none; box-shadow: none; pointer-events: none;}

        .msg-box { margin-top: 15px; font-size: 0.9rem; display: none; padding: 16px; border-radius: 14px; line-height: 1.5; animation: fadeIn 0.3s ease; }
        .msg-err { background: rgba(239, 68, 68, 0.1); color: #FCA5A5; border: 1px solid rgba(239, 68, 68, 0.2); }
        .msg-succ { background: var(--success-bg); color: #6EE7B7; border: 1px solid rgba(16, 185, 129, 0.3); }

        .spinner { border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- BOTTOM NAVIGATION --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(6, 9, 15, 0.9); backdrop-filter: blur(15px);
            border-top: 1px solid var(--card-border);
            display: flex; justify-content: space-around; padding: 15px 0; z-index: 100;
        }
        .nav-item {
            background: transparent; border: none; color: var(--text-gray);
            font-family: 'Poppins', sans-serif; font-size: 1rem; font-weight: 600;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            cursor: pointer; transition: var(--transition); width: 50%;
        }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); }
        .nav-icon { font-size: 1.4rem; }

    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-anim-container">
            <div class="anim-coin">₿</div>
            <div class="anim-box">🎁</div>
        </div>
        <div class="splash-title">Crypto Giveaway</div>
        <div class="loading-bar"><div class="loading-progress"></div></div>
    </div>

    <div id="view-giveaway" class="view-container active">
        <div class="profile-card">
            <img src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff" class="profile-avatar" id="tg-avatar" alt="Avatar">
            <div class="profile-info">
                <div class="profile-name" id="tg-name">Loading...</div>
                <div class="profile-uid" id="tg-uid">UID: Loading...</div>
            </div>
        </div>

        <div class="giveaway-card">
            <h1 class="prize-title">$50</h1>
            <p class="subtitle">Crypto Group Giveaway</p>

            <div class="timer-wrapper" id="timer-ui">
                <div class="time-box"><span class="time-val" id="t-days">00</span><span class="time-lbl">Days</span></div>
                <div class="time-box"><span class="time-val" id="t-hours">00</span><span class="time-lbl">Hours</span></div>
                <div class="time-box"><span class="time-val" id="t-mins">00</span><span class="time-lbl">Mins</span></div>
                <div class="time-box"><span class="time-val" id="t-secs">00</span><span class="time-lbl">Secs</span></div>
            </div>

            <div class="steps-container">
                <div class="step-card">
                    <div class="step-header">Step 1: Join Channel</div>
                    <p class="step-desc">Required to participate in the draw.</p>
                    <a href="https://t.me/Crypto_group_2026" target="_blank" class="btn btn-join" id="join-btn" onclick="markJoined()">🔗 Join Channel</a>
                </div>

                <div class="step-card">
                    <div class="step-header">
                        Step 2: Watch Ads
                        <span class="ad-counter"><span id="ad-progress">0</span>/10</span>
                    </div>
                    <p class="step-desc">Watch 10 short ads to secure your entry.</p>
                    <button class="btn btn-ad" id="watch-btn" onclick="watchAd()">🎥 Watch Ad</button>
                </div>

                <button class="btn btn-verify" id="verify-action" onclick="processVerification()">Verify & Enter Giveaway</button>
                <div class="msg-box" id="msg-display"></div>
            </div>
        </div>
    </div>

    <div id="view-wallet" class="view-container">
        <div class="section-title">Your Wallet</div>
        <div class="wallet-card">
            <div class="balance-title">Available Balance</div>
            <div class="balance-amount"><span id="wallet-balance">0</span> USDT</div>
            
            <div id="ton-connect"></div>

            <button class="btn btn-verify" onclick="requestWithdraw()">💸 Withdraw Funds</button>
            <div class="msg-box" id="wallet-msg" style="display: none;"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" id="nav-gw" onclick="switchTab('giveaway')">
            <span class="nav-icon">🎁</span>
            Giveaway
        </button>
        <button class="nav-item" id="nav-wallet" onclick="switchTab('wallet')">
            <span class="nav-icon">👛</span>
            Wallet
        </button>
    </div>

    <script>
        // Security: Prevent text copying & selection
        ['contextmenu', 'dragstart', 'copy', 'cut', 'paste', 'selectstart'].forEach(evt => 
            document.addEventListener(evt, e => e.preventDefault())
        );

        // Telegram Integration
        const tgApp = window.Telegram?.WebApp;
        if(tgApp) tgApp.expand();

        function getUID() { return tgApp?.initDataUnsafe?.user?.id || '123456789'; }
        function saveStat(key, val) { localStorage.setItem(`${key}_${getUID()}`, val); }
        function getStat(key) { return localStorage.getItem(`${key}_${getUID()}`); }

        // Simulated Balance
        let currentBalance = 0; 

        // TonConnect Setup
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            // Buradakı URL sizə yaratdığınız manifest.json faylının linkini göstərir.
            manifestUrl: 'https://manatazn.github.io/CryptoGame/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        // Adsgram Setup
        let adController = null;
        if (window.Adsgram) {
            adController = window.Adsgram.init({ blockId: "int-30043" });
        }

        // App Initialization
        document.addEventListener('DOMContentLoaded', () => {
            initProfile();
            startSystem();
            
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 800);
            }, 2500);
        });

        function initProfile() {
            const user = tgApp?.initDataUnsafe?.user;
            if (user) {
                document.getElementById('tg-name').innerText = `${user.first_name} ${user.last_name || ''}`.trim();
                document.getElementById('tg-uid').innerText = `UID: ${user.id}`;
                if (user.photo_url) document.getElementById('tg-avatar').src = user.photo_url;
            } else {
                document.getElementById('tg-name').innerText = "Guest User";
                document.getElementById('tg-uid').innerText = `UID: ${getUID()}`;
            }
            updateAdUI();
        }

        // Tab Navigation
        function switchTab(tabId) {
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

            if (tabId === 'giveaway') {
                document.getElementById('view-giveaway').classList.add('active');
                document.getElementById('nav-gw').classList.add('active');
            } else if (tabId === 'wallet') {
                document.getElementById('view-wallet').classList.add('active');
                document.getElementById('nav-wallet').classList.add('active');
            }
        }

        // Withdrawal Logic
        function requestWithdraw() {
            const msgBox = document.getElementById('wallet-msg');
            msgBox.style.display = 'block';

            // Check if wallet is connected via TonConnect
            if (!tonConnectUI.connected) {
                msgBox.className = "msg-box msg-err";
                msgBox.innerHTML = "⚠️ <b>Error:</b> Please connect your TON wallet first to withdraw funds.";
                return;
            }

            // Check Balance
            if (currentBalance <= 0) {
                msgBox.className = "msg-box msg-err";
                msgBox.innerHTML = "⚠️ <b>Insufficient Balance:</b> You have 0 USDT. Complete giveaways to earn funds before withdrawing.";
            } else {
                // If balance > 0
                msgBox.className = "msg-box msg-succ";
                msgBox.innerHTML = "✅ <b>Success:</b> Withdrawal request initiated to your connected wallet.";
                // You can add logic here to deduct balance
            }
        }

        // Timer Logic
        const END_TIME = new Date("2026-05-31T20:00:00Z").getTime();
        function refreshTimer() {
            const now = new Date().getTime();
            const diff = END_TIME - now;
            
            if (diff <= 0) return;
            
            document.getElementById("t-days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("t-hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("t-mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("t-secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }

        // Actions & Verification
        function markJoined() {
            saveStat("gw_joined", "true");
            const btn = document.getElementById("join-btn");
            btn.innerHTML = "✓ Channel Joined";
            btn.className = "btn btn-join joined";
        }

        function watchAd() {
            if (!adController) {
                alert("Ads are currently initializing. Please try again in a few seconds.");
                return;
            }
            
            const btn = document.getElementById("watch-btn");
            const originalText = btn.innerHTML;
            btn.innerHTML = "<span class='spinner'></span> Loading...";
            
            adController.show().then(() => {
                let currentAds = parseInt(getStat("gw_ads_count") || "0");
                if (currentAds < 10) {
                    currentAds++;
                    saveStat("gw_ads_count", currentAds.toString());
                    updateAdUI();
                }
                btn.innerHTML = originalText;
            }).catch((err) => {
                console.log("Ad skipped or failed", err);
                btn.innerHTML = originalText;
            });
        }

        function updateAdUI() {
            let currentAds = parseInt(getStat("gw_ads_count") || "0");
            document.getElementById("ad-progress").innerText = currentAds;
            
            if (currentAds >= 10) {
                const btn = document.getElementById("watch-btn");
                btn.innerHTML = "✅ All Ads Watched";
                btn.className = "btn btn-ad joined";
            }
            if (getStat("gw_joined") === "true") {
                const joinBtn = document.getElementById("join-btn");
                joinBtn.innerHTML = "✓ Channel Joined";
                joinBtn.className = "btn btn-join joined";
            }
        }

        function checkUIState() {
            updateAdUI();
            if (getStat("gw_secured") === "true") {
                const verifyBtn = document.getElementById("verify-action");
                const msg = document.getElementById("msg-display");
                verifyBtn.style.display = "none";
                msg.className = "msg-box msg-succ";
                msg.innerHTML = "🎉 <b>Entry Secured:</b> You are successfully entered into the giveaway. Good luck!";
                msg.style.display = "block";
                return true;
            }
            return false;
        }

        function processVerification() {
            if (checkUIState()) return;

            const hasJoined = getStat("gw_joined") === "true";
            const adsWatched = parseInt(getStat("gw_ads_count") || "0");
            const msg = document.getElementById("msg-display");
            const btn = document.getElementById("verify-action");

            if (!hasJoined || adsWatched < 10) {
                msg.className = "msg-box msg-err";
                let errText = "⚠️ <b>Action Required:</b><br>";
                if (!hasJoined) errText += "• Please join the channel.<br>";
                if (adsWatched < 10) errText += `• Watch ${10 - adsWatched} more ad(s).`;
                msg.innerHTML = errText;
                msg.style.display = "block";
                return;
            }

            btn.innerHTML = "<span class='spinner'></span> Verifying Entry...";
            btn.disabled = true;
            msg.style.display = "none";

            setTimeout(() => {
                saveStat("gw_secured", "true");
                checkUIState();
            }, 2000);
        }

        function startSystem() {
            setInterval(refreshTimer, 1000);
            
            setInterval(() => {
                if (adController && document.getElementById('view-giveaway').classList.contains('active')) {
                    adController.show().catch(e => console.log('Auto Ad Skipped'));
                }
            }, 15000);
        }
    </script>
</body>
</html>

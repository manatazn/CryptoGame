<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Giveaway</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#040816;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#00aaff33,transparent 30%),
radial-gradient(circle at bottom,#0066ff22,transparent 30%),
#040816;
z-index:-1;
}

.card{
width:420px;
max-width:95%;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
padding:40px 30px;
border-radius:30px;
text-align:center;
box-shadow:0 0 50px rgba(0,153,255,0.2);
position:relative;
overflow:hidden;
}

.glow{
position:absolute;
width:250px;
height:250px;
background:#0099ff;
filter:blur(120px);
opacity:.35;
top:-120px;
left:50%;
transform:translateX(-50%);
}

h1{
font-size:34px;
margin-bottom:25px;
letter-spacing:2px;
}

.reward{
font-size:55px;
font-weight:bold;
color:#00d4ff;
margin-bottom:25px;
}

.timer{
font-size:30px;
font-weight:bold;
margin-bottom:25px;
letter-spacing:2px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#0066ff,#00d4ff);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 30px #00d4ff;
}

.status{
margin-top:18px;
font-size:15px;
color:#00ff99;
min-height:20px;
}

.winner{
display:none;
margin-top:25px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

.winner h2{
font-size:32px;
margin-top:10px;
color:#00d4ff;
}

</style>
</head>
<body>

<div class="bg"></div>

<div class="card">

<div class="glow"></div>

<h1>CRYPTO GIVEAWAY</h1>

<div class="reward">$50</div>

<div class="timer" id="timer">
Loading...
</div>

<button id="joinBtn">
JOIN GIVEAWAY
</button>

<div class="status" id="status"></div>

<div class="winner" id="winner">
<span>WINNER</span>
<h2>@Ney9773883</h2>
</div>

</div>

<script>

const END_DATE = "2026-05-31T22:00:00Z";

const CHANNEL = "https://t.me/Crypto_group_2026";

const timer = document.getElementById("timer");
const joinBtn = document.getElementById("joinBtn");
const status = document.getElementById("status");
const winner = document.getElementById("winner");

let serverOffset = 0;

async function syncServerTime(){

const response = await fetch(
"https://worldtimeapi.org/api/timezone/Etc/UTC"
);

const data = await response.json();

const serverNow = new Date(data.utc_datetime).getTime();

const localNow = Date.now();

serverOffset = serverNow - localNow;

}

function updateTimer(){

const now = Date.now() + serverOffset;

const end = new Date(END_DATE).getTime();

const distance = end - now;

if(distance <= 0){

timer.innerHTML = "GIVEAWAY ENDED";

joinBtn.style.display = "none";

winner.style.display = "block";

return;

}

const days = Math.floor(distance / (1000*60*60*24));

const hours = Math.floor(
(distance % (1000*60*60*24)) /
(1000*60*60)
);

const minutes = Math.floor(
(distance % (1000*60*60)) /
(1000*60)
);

const seconds = Math.floor(
(distance % (1000*60)) / 1000
);

timer.innerHTML =
`${days}D ${hours}H ${minutes}M ${seconds}S`;

}

joinBtn.onclick = () => {

window.open(CHANNEL,"_blank");

status.innerHTML =
"Join the channel and stay active until giveaway ends.";

};

(async()=>{

await syncServerTime();

updateTimer();

setInterval(updateTimer,1000);

})();

</script>

</body>
</html>

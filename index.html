<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Giveaway</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#00aaff22,transparent 30%),
radial-gradient(circle at bottom,#0066ff22,transparent 30%),
#050816;
z-index:-1;
}

.card{
width:430px;
max-width:95%;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
padding:40px 30px;
border-radius:30px;
text-align:center;
position:relative;
overflow:hidden;
box-shadow:0 0 50px rgba(0,153,255,0.2);
}

.glow{
position:absolute;
top:-120px;
left:50%;
transform:translateX(-50%);
width:260px;
height:260px;
background:#0099ff;
filter:blur(120px);
opacity:.4;
}

h1{
font-size:34px;
margin-bottom:25px;
letter-spacing:2px;
}

.reward-title{
opacity:.7;
margin-bottom:10px;
display:block;
}

.reward{
font-size:58px;
font-weight:bold;
color:#00d4ff;
margin-bottom:25px;
}

.timer{
font-size:30px;
font-weight:bold;
margin-bottom:25px;
letter-spacing:2px;
}

.join-btn,
.check-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
margin-top:12px;
}

.join-btn{
background:linear-gradient(90deg,#0066ff,#00d4ff);
color:white;
}

.check-btn{
background:#111827;
color:white;
border:1px solid rgba(255,255,255,0.08);
}

.join-btn:hover,
.check-btn:hover{
transform:scale(1.02);
}

.status{
margin-top:18px;
min-height:20px;
font-size:15px;
}

.success{
color:#00ff99;
}

.error{
color:#ff4d6d;
}

.joined{
background:#00c853 !important;
pointer-events:none;
}

.winner{
display:none;
margin-top:25px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

.winner h2{
margin-top:10px;
font-size:34px;
color:#00d4ff;
}

</style>
</head>
<body>

<div class="bg"></div>

<div class="card">

<div class="glow"></div>

<h1>CRYPTO GIVEAWAY</h1>

<span class="reward-title">Prize Pool</span>

<div class="reward">$50</div>

<div class="timer" id="timer">
00D 00H 00M 00S
</div>

<button class="join-btn" id="joinBtn">
JOIN CHANNEL
</button>

<button class="check-btn" id="checkBtn">
I JOINED
</button>

<div class="status" id="status"></div>

<div class="winner" id="winner">
<span>WINNER</span>
<h2>@Ney9773883</h2>
</div>

</div>

<script>

const CHANNEL_LINK = "https://t.me/Crypto_group_2026";

const END_TIME = "2026-05-31T22:00:00Z";

const joinBtn = document.getElementById("joinBtn");
const checkBtn = document.getElementById("checkBtn");
const timer = document.getElementById("timer");
const statusBox = document.getElementById("status");
const winnerBox = document.getElementById("winner");

let serverOffset = 0;

async function syncTime(){

try{

const response = await fetch(
"https://worldtimeapi.org/api/timezone/Etc/UTC"
);

const data = await response.json();

const serverNow = new Date(data.utc_datetime).getTime();

const localNow = Date.now();

serverOffset = serverNow - localNow;

updateTimer();

setInterval(updateTimer,1000);

}catch(e){

timer.innerHTML = "TIME ERROR";

}

}

function updateTimer(){

const now = Date.now() + serverOffset;

const end = new Date(END_TIME).getTime();

const distance = end - now;

if(distance <= 0){

timer.innerHTML = "GIVEAWAY ENDED";

joinBtn.style.display = "none";

checkBtn.style.display = "none";

winnerBox.style.display = "block";

return;

}

const days = Math.floor(distance / (1000*60*60*24));

const hours = Math.floor(
(distance % (1000*60*60*24)) /
(1000*60*60)
);

const minutes = Math.floor(
(distance % (1000*60*60)) /
(1000*60)
);

const seconds = Math.floor(
(distance % (1000*60)) / 1000
);

timer.innerHTML =
`${days}D ${hours}H ${minutes}M ${seconds}S`;

}

joinBtn.onclick = () => {

window.open(CHANNEL_LINK,"_blank");

};

checkBtn.onclick = async () => {

statusBox.innerHTML =
"<span class='success'>Checking subscription...</span>";

await new Promise(r=>setTimeout(r,1500));

checkBtn.innerHTML = "JOINED";

checkBtn.classList.add("joined");

statusBox.innerHTML =
"<span class='success'>Successfully joined giveaway</span>";

};

syncTime();

</script>

</body>
</html>
